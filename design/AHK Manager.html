<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AHK Manager</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
/* AHK Manager — Design Tokens & Globals
   Dark-only, developer-tool aesthetic. VS Code / Linear / terminal energy. */

:root {
  /* ── Surfaces (deepest → raised) ─────────────────────────────── */
  --bg-0: #08080b;       /* app shell behind everything */
  --bg-1: #0d0d11;       /* main canvas */
  --bg-2: #121218;       /* panels, sidebar */
  --bg-3: #181820;       /* raised cards, table */
  --bg-4: #1f1f29;       /* hover */
  --bg-5: #272732;       /* selected, active row */

  /* ── Borders ─────────────────────────────────────────────────── */
  --border: #20202a;
  --border-strong: #2d2d39;
  --border-focus: var(--accent);

  /* ── Text ────────────────────────────────────────────────────── */
  --text-0: #ededf0;     /* primary */
  --text-1: #a4a4b0;     /* secondary */
  --text-2: #6b6b78;     /* tertiary, descriptions */
  --text-3: #44444f;     /* disabled, separators in text */

  /* ── Accent (themeable via tweaks) ───────────────────────────── */
  --accent: #7c5cff;
  --accent-hi: #9277ff;
  --accent-lo: #5e3fe6;
  --accent-soft: rgba(124, 92, 255, 0.14);
  --accent-ring: rgba(124, 92, 255, 0.32);

  /* ── Semantic ────────────────────────────────────────────────── */
  --success: #2ee68a;       /* running dot */
  --success-soft: rgba(46, 230, 138, 0.12);
  --success-ring: rgba(46, 230, 138, 0.28);
  --warning: #ffb340;
  --warning-soft: rgba(255, 179, 64, 0.14);
  --danger: #ff5570;
  --danger-soft: rgba(255, 85, 112, 0.14);

  /* Action-type pill colors */
  --tag-send: #6dd3ff;
  --tag-run: #c197ff;
  --tag-top: #ffb96b;
  --tag-custom: #2ee68a;

  /* ── Radii ───────────────────────────────────────────────────── */
  --r-1: 4px;
  --r-2: 6px;
  --r-3: 8px;
  --r-4: 10px;
  --r-5: 14px;

  /* ── Spacing scale (tight) ───────────────────────────────────── */
  --s-1: 4px;
  --s-2: 6px;
  --s-3: 8px;
  --s-4: 12px;
  --s-5: 16px;
  --s-6: 20px;
  --s-7: 28px;

  /* ── Type ────────────────────────────────────────────────────── */
  --font-sans: "Geist", "Inter", -apple-system, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;

  /* ── Shadows ─────────────────────────────────────────────────── */
  --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.4);
  --shadow-2: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-3: 0 12px 32px rgba(0, 0, 0, 0.55), 0 2px 6px rgba(0, 0, 0, 0.3);
  --shadow-modal: 0 24px 80px rgba(0, 0, 0, 0.7), 0 4px 16px rgba(0, 0, 0, 0.4);

  /* Row height — themed by density */
  --row-h: 36px;
  --pad-y: 8px;
}

/* Density variants */
[data-density="tight"] {
  --row-h: 32px;
  --pad-y: 6px;
}
[data-density="comfy"] {
  --row-h: 44px;
  --pad-y: 12px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--bg-0);
  color: var(--text-0);
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
  overflow: hidden;
}

button {
  font: inherit;
  color: inherit;
  background: none;
  border: 0;
  padding: 0;
  cursor: default;
}

input, textarea, select {
  font: inherit;
  color: inherit;
  background: none;
  border: 0;
  outline: 0;
}

::selection {
  background: var(--accent-soft);
  color: var(--text-0);
}

/* Scrollbars — minimal */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--bg-4);
  border: 2px solid transparent;
  border-radius: 8px;
  background-clip: content-box;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--bg-5);
  background-clip: content-box;
  border: 2px solid transparent;
}

/* ── App shell ───────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-rows: 36px 1fr 52px;
  height: 100vh;
  background: var(--bg-1);
}

/* ── Title bar (custom window chrome) ────────────────────────────── */
.titlebar {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: 0 var(--s-3) 0 var(--s-4);
  background: linear-gradient(180deg, #0f0f15, #0a0a0e);
  border-bottom: 1px solid var(--border);
  -webkit-app-region: drag;
  font-size: 12px;
  color: var(--text-1);
  user-select: none;
}
.titlebar-logo {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  font-weight: 600;
  color: var(--text-0);
  letter-spacing: -0.005em;
}
.titlebar-logo-mark {
  width: 16px;
  height: 16px;
  border-radius: 4px;
  background:
    linear-gradient(135deg, var(--accent), var(--accent-hi));
  position: relative;
  display: grid;
  place-items: center;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.04em;
  box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 2px 6px var(--accent-ring);
}
.titlebar-trail {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 2px;
}
.win-ctrl {
  width: 32px;
  height: 28px;
  display: grid;
  place-items: center;
  color: var(--text-1);
  border-radius: var(--r-1);
}
.win-ctrl:hover { background: var(--bg-3); color: var(--text-0); }
.win-ctrl.close:hover { background: var(--danger); color: #fff; }
.titlebar-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-2);
  padding-left: var(--s-4);
  border-left: 1px solid var(--border);
  margin-left: var(--s-3);
}

/* ── Main split ──────────────────────────────────────────────────── */
.main {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 0;
  border-bottom: 1px solid var(--border);
}

/* ── Sidebar ─────────────────────────────────────────────────────── */
.sidebar {
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.sidebar-head {
  padding: var(--s-5) var(--s-4) var(--s-3);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-head-title {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-2);
}
.sidebar-head-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
}
.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 var(--s-2) var(--s-3);
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.profile-item {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: var(--s-2) var(--s-3);
  border-radius: var(--r-2);
  color: var(--text-1);
  cursor: default;
  position: relative;
  user-select: none;
  font-size: 13px;
}
.profile-item:hover { background: var(--bg-3); color: var(--text-0); }
.profile-item.active {
  background: var(--bg-3);
  color: var(--text-0);
}
.profile-item.active::before {
  content: "";
  position: absolute;
  left: -2px;
  top: 7px;
  bottom: 7px;
  width: 2px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.profile-item .pi-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-3);
  flex-shrink: 0;
}
.profile-item.running .pi-dot {
  background: var(--success);
  box-shadow: 0 0 0 3px var(--success-soft);
}
.profile-item .pi-name {
  flex: 1;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.profile-item .pi-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
}
.profile-item .pi-actions {
  display: none;
  gap: 2px;
}
.profile-item:hover .pi-actions { display: flex; }
.pi-action-btn {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  display: grid;
  place-items: center;
  color: var(--text-2);
}
.pi-action-btn:hover { background: var(--bg-5); color: var(--text-0); }
.pi-action-btn.apply-btn:hover { background: var(--success-soft); color: var(--success); }
.pi-action-btn.stop-btn {
  display: grid;
  margin-left: auto;
  color: var(--success);
  background: var(--success-soft);
}
.pi-action-btn.stop-btn:hover { background: var(--danger-soft); color: var(--danger); }
.sidebar-foot {
  padding: var(--s-3) var(--s-3) var(--s-4);
  border-top: 1px solid var(--border);
}

/* ── Content panel ───────────────────────────────────────────────── */
.content {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 0;
  background: var(--bg-1);
}
.content-head {
  padding: var(--s-5) var(--s-6) var(--s-4);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--s-5);
  border-bottom: 1px solid var(--border);
}
.profile-title {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.015em;
}
.profile-title .editable:hover {
  background: var(--bg-3);
  border-radius: var(--r-2);
  cursor: text;
}
.profile-sub {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-2);
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  gap: var(--s-3);
}
.profile-sub .sep {
  color: var(--text-3);
}

/* ── Status pill ─────────────────────────────────────────────────── */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  padding: 4px 10px 4px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-family: var(--font-mono);
  font-weight: 500;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: var(--bg-3);
  color: var(--text-1);
}
.status-pill .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-2);
  flex-shrink: 0;
}
.status-pill.running {
  color: var(--success);
  background: var(--success-soft);
  border-color: var(--success-ring);
}
.status-pill.running .dot {
  background: var(--success);
  box-shadow: 0 0 0 3px var(--success-ring);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px var(--success-ring); }
  50% { box-shadow: 0 0 0 5px transparent; }
}

/* ── Body — table + preview ──────────────────────────────────────── */
.body {
  display: grid;
  grid-template-columns: 1fr;
  min-height: 0;
  overflow: hidden;
}
.body.with-preview {
  grid-template-columns: 1fr 420px;
}
.table-wrap {
  overflow: auto;
  padding: var(--s-5) var(--s-6) var(--s-5);
}
.toolbar {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  margin-bottom: var(--s-4);
}
.toolbar .search {
  flex: 1;
  max-width: 320px;
}
.toolbar .spacer { flex: 1; }

/* ── Table ───────────────────────────────────────────────────────── */
.table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  overflow: hidden;
  font-size: 13px;
}
.table thead th {
  text-align: left;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-2);
  padding: var(--s-3) var(--s-4);
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  user-select: none;
  white-space: nowrap;
}
.table tbody td {
  padding: var(--pad-y) var(--s-4);
  border-bottom: 1px solid var(--border);
  height: var(--row-h);
  vertical-align: middle;
}
.table tbody tr:last-child td { border-bottom: 0; }
.table tbody tr {
  transition: background-color 0.08s ease;
}
.table tbody tr:hover { background: var(--bg-3); }
.table tbody tr.disabled td { opacity: 0.4; }
.table tbody tr.disabled td:first-child { opacity: 1; } /* keep toggle clear */
.table .col-toggle { width: 36px; }
.table .col-trigger { width: 220px; }
.table .col-action { width: 140px; }
.table .col-actions { width: 88px; text-align: right; }
.table .row-actions {
  display: flex;
  gap: 2px;
  justify-content: flex-end;
  opacity: 0;
}
.table tbody tr:hover .row-actions { opacity: 1; }
.table .desc { color: var(--text-1); }
.table .desc.empty { color: var(--text-3); font-style: italic; }

/* Drag handle */
.drag-handle {
  width: 14px;
  color: var(--text-3);
  cursor: grab;
  display: inline-flex;
  align-items: center;
  margin-right: 4px;
}

/* ── Keycap ──────────────────────────────────────────────────────── */
.kbd {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-0);
  background: linear-gradient(180deg, #25252f, #1c1c24);
  border: 1px solid #2d2d39;
  border-bottom-color: #14141a;
  border-radius: var(--r-1);
  padding: 2px 6px;
  min-width: 18px;
  height: 20px;
  justify-content: center;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.04) inset,
    0 1px 0 rgba(0,0,0,0.5);
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.kbd.mod {
  color: var(--text-1);
}
.kbd-combo {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.kbd-combo .plus {
  color: var(--text-3);
  font-family: var(--font-mono);
  font-size: 10px;
}

/* Keycap style: inline */
[data-kbd="inline"] .kbd {
  background: var(--bg-3);
  border-color: var(--border);
  border-bottom-color: var(--border);
  box-shadow: none;
}
/* Keycap style: chip (linear/raycast) */
[data-kbd="chip"] .kbd {
  background: var(--bg-3);
  border-color: var(--border-strong);
  border-bottom-color: var(--border-strong);
  box-shadow: none;
  padding: 1px 7px;
}

/* ── Action-type tag ─────────────────────────────────────────────── */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  padding: 1px 8px;
  border-radius: var(--r-1);
  background: var(--bg-4);
  color: var(--text-1);
  letter-spacing: -0.005em;
  white-space: nowrap;
}
.tag::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 1px;
  background: currentColor;
  flex-shrink: 0;
}
.tag.send { color: var(--tag-send); }
.tag.run { color: var(--tag-run); }
.tag.top { color: var(--tag-top); }
.tag.custom { color: var(--tag-custom); }

/* ── Toggle ──────────────────────────────────────────────────────── */
.tgl {
  width: 28px;
  height: 16px;
  border-radius: 999px;
  background: var(--bg-5);
  border: 1px solid var(--border-strong);
  position: relative;
  flex-shrink: 0;
  transition: background-color 0.15s ease, border-color 0.15s ease;
}
.tgl::after {
  content: "";
  position: absolute;
  top: 1px;
  left: 1px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--text-1);
  transition: transform 0.18s cubic-bezier(.4,0,.2,1), background-color 0.15s ease;
}
.tgl.on {
  background: var(--accent);
  border-color: var(--accent);
}
.tgl.on::after {
  background: #fff;
  transform: translateX(12px);
}

/* ── Buttons ─────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 30px;
  padding: 0 12px;
  border-radius: var(--r-2);
  font-size: 12.5px;
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--text-0);
  background: var(--bg-3);
  border: 1px solid var(--border-strong);
  white-space: nowrap;
  transition: background-color 0.1s ease, border-color 0.1s ease, transform 0.05s ease;
  user-select: none;
}
.btn:hover { background: var(--bg-4); border-color: #3a3a47; }
.btn:active { transform: translateY(0.5px); }
.btn:disabled { opacity: 0.4; pointer-events: none; }
.btn .icon { width: 14px; height: 14px; }

.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 0 1px var(--accent-ring), 0 1px 0 rgba(255,255,255,0.12) inset;
}
.btn.primary:hover { background: var(--accent-hi); border-color: var(--accent-hi); }

.btn.success {
  background: var(--success);
  border-color: var(--success);
  color: #03200f;
  font-weight: 600;
  box-shadow: 0 0 0 1px var(--success-ring), 0 1px 0 rgba(255,255,255,0.2) inset;
}
.btn.success:hover { filter: brightness(1.06); }

.btn.danger:hover { color: var(--danger); border-color: var(--danger-soft); background: var(--danger-soft); }

.btn.ghost { background: transparent; border-color: transparent; color: var(--text-1); }
.btn.ghost:hover { background: var(--bg-3); color: var(--text-0); border-color: transparent; }

.btn.sm { height: 26px; padding: 0 9px; font-size: 12px; }
.btn.icon-only { width: 30px; padding: 0; }
.btn.sm.icon-only { width: 26px; }

/* ── Segmented ───────────────────────────────────────────────────── */
.seg {
  display: inline-flex;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  padding: 2px;
  gap: 2px;
}
.seg-btn {
  padding: 4px 10px;
  font-size: 12px;
  border-radius: 4px;
  color: var(--text-1);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-weight: 500;
}
.seg-btn:hover { color: var(--text-0); }
.seg-btn.on {
  background: var(--bg-4);
  color: var(--text-0);
  box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
}

/* ── Inputs ──────────────────────────────────────────────────────── */
.input,
.textarea,
.select {
  width: 100%;
  height: 32px;
  padding: 0 10px;
  background: var(--bg-1);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-2);
  font-size: 13px;
  color: var(--text-0);
  font-family: var(--font-sans);
  transition: border-color 0.1s ease, box-shadow 0.1s ease;
}
.input::placeholder, .textarea::placeholder { color: var(--text-3); }
.input:hover, .select:hover, .textarea:hover { border-color: #3a3a47; }
.input:focus, .select:focus, .textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-ring);
}
.input.mono { font-family: var(--font-mono); font-size: 12.5px; }
.textarea {
  height: auto;
  min-height: 80px;
  padding: 8px 10px;
  resize: vertical;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.55;
}
.select {
  appearance: none;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────

// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {

function TweakToggle({ label, value, onChange }) {

              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

  useTweaks, TweaksPanel, TweakSection, TweakRow,

  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ── Keycap ──────────────────────────────────────────────────────── */
// Parses an AHK-style trigger like "^+4" or "^SPACE" into display tokens.
function parseTrigger(trigger) {
  if (!trigger) return [];
  const tokens = [];
  let i = 0;
  while (i < trigger.length) {
    const c = trigger[i];
    if (c === "^") { tokens.push({ k: "Ctrl", mod: true }); i++; }
    else if (c === "+") { tokens.push({ k: "Shift", mod: true }); i++; }
    else if (c === "!") { tokens.push({ k: "Alt", mod: true }); i++; }
    else if (c === "#") { tokens.push({ k: "Win", mod: true }); i++; }
    else {
      const rest = trigger.slice(i).toUpperCase();
      // named keys
      const named = ["SPACE","ENTER","TAB","ESC","ESCAPE","BACKSPACE","DELETE","UP","DOWN","LEFT","RIGHT","HOME","END","PGUP","PGDN"];
      const match = named.find((n) => rest.startsWith(n));
      if (match) {
        const display = match === "SPACE" ? "Space" : match.charAt(0) + match.slice(1).toLowerCase();
        tokens.push({ k: display, mod: false });
        i += match.length;
      } else {
        tokens.push({ k: trigger.slice(i).toUpperCase(), mod: false });
        i = trigger.length;
      }
    }
  }
  return tokens;
}

function Keycap({ trigger }) {
  const tokens = parseTrigger(trigger);
  if (tokens.length === 0) return <span className="muted mono" style={{ fontSize: 11 }}>—</span>;
  return (
    <span className="kbd-combo">
      {tokens.map((t, i) => (
        <React.Fragment key={i}>
          {i > 0 && <span className="plus">+</span>}
          <span className={"kbd " + (t.mod ? "mod" : "")}>{t.k}</span>
        </React.Fragment>
      ))}
    </span>
  );
}

/* ── Trigger recorder ────────────────────────────────────────────── */
function TriggerRecorder({ value, onChange }) {
  const [listening, setListening] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!listening) return;
    const onKey = (e) => {
      e.preventDefault();
      const mods = [];
      if (e.ctrlKey) mods.push("^");
      if (e.shiftKey) mods.push("+");
      if (e.altKey) mods.push("!");
      if (e.metaKey) mods.push("#");
      const k = e.key;
      // Ignore pure modifier presses
      if (["Control","Shift","Alt","Meta"].includes(k)) return;
      let main = "";
      if (k === " ") main = "SPACE";
      else if (k.length === 1) main = k.toUpperCase();
      else if (k.startsWith("Arrow")) main = k.replace("Arrow", "").toUpperCase();
      else main = k.toUpperCase();
      onChange(mods.join("") + main);
      setListening(false);
    };
    window.addEventListener("keydown", onKey, true);
    return () => window.removeEventListener("keydown", onKey, true);
  }, [listening, onChange]);

  return (
    <div
      ref={ref}
      className={"recorder " + (listening ? "listening" : "")}
      tabIndex={0}
      onClick={() => setListening(true)}
      onBlur={() => setListening(false)}
    >
      {listening ? (
        <span className="listening-text">● PRESS KEYS…</span>
      ) : value ? (
        <Keycap trigger={value} />
      ) : (
        <span className="placeholder">Click to record a key combo</span>
      )}
      <div style={{ marginLeft: "auto", display: "flex", gap: 6, alignItems: "center" }}>
        {value && !listening && (
          <button
            className="btn ghost sm icon-only"
            onClick={(e) => { e.stopPropagation(); onChange(""); }}
            title="Clear"
          ><Icon.Close /></button>
        )}
        {!listening && (
          <span className="muted mono" style={{ fontSize: 10, paddingRight: 4 }}>↵ to record</span>
        )}
      </div>
    </div>
  );
}

        autoFocus
        className={"input " + (className || "")}
        style={{ width: "auto", minWidth: 200, height: 28, fontSize: 18, fontWeight: 600, padding: "0 6px" }}
        value={v}
        onChange={(e) => setV(e.target.value)}
        onBlur={() => { onChange(v.trim() || value); setEditing(false); }}
        onKeyDown={(e) => {
          if (e.key === "Enter") { onChange(v.trim() || value); setEditing(false); }
          else if (e.key === "Escape") { setV(value); setEditing(false); }
        }}
      />
    );
  }
  return (
    <span
      className={"editable " + (className || "")}
      style={{ padding: "0 6px", borderRadius: 6 }}
      onDoubleClick={() => setEditing(true)}
    >
      {value}
    </span>
  );
}

const ToastCtx = createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const idRef = useRef(0);
  const push = useCallback((t) => {
    const id = ++idRef.current;
    setToasts((cur) => [...cur, { id, ...t }]);
    setTimeout(() => setToasts((cur) => cur.filter((x) => x.id !== id)), t.duration || 3600);
  }, []);
  const dismiss = useCallback((id) => setToasts((cur) => cur.filter((x) => x.id !== id)), []);
  return (
    <ToastCtx.Provider value={{ push }}>
      {children}
      <div className="toasts">
        {toasts.map((t) => (
          <div key={t.id} className={"toast " + (t.kind || "info")}>
            <div className="toast-body">
              <div className="toast-title">{t.title}</div>
              {t.desc && <div className="toast-desc">{t.desc}</div>}
            </div>
            <button className="toast-close" onClick={() => dismiss(t.id)}><Icon.Close /></button>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

/* ── AHK Code generator ──────────────────────────────────────────── */
function generateAhk(profile) {
  const lines = [];
  lines.push({ k: "comment", text: `; Generated by AHK Manager — Profile: ${profile.name}` });
  lines.push({ k: "comment", text: "; Do not edit manually — use AHK Manager instead" });
  lines.push({ k: "blank" });
  const active = profile.hotkeys.filter((h) => h.enabled);
  if (active.length === 0) {
    lines.push({ k: "comment", text: "; No enabled hotkeys" });
    return lines;
  }
  active.forEach((h, idx) => {
    if (idx > 0) lines.push({ k: "blank" });
    lines.push({ k: "hotkey", text: `${h.trigger}::`, comment: h.description });
    if (h.action_type === "send_text") {
      const v = h.action_value.replace(/\n/g, "`n").replace(/\t/g, "`t");
      lines.push({ k: "cmd", text: `    Send, ${v}` });
      if (h.append_enter) lines.push({ k: "cmd", text: `    Send, {Enter}` });
    } else if (h.action_type === "run") {
      lines.push({ k: "cmd", text: `    Run, ${h.action_value}` });
    } else if (h.action_type === "always_on_top") {
      lines.push({ k: "cmd", text: `    Winset, Alwaysontop, , A` });
    } else if (h.action_type === "custom") {
      h.action_value.split("\n").forEach((l) => {
        lines.push({ k: "cmd", text: `    ${l}` });
      });
    }
    lines.push({ k: "return", text: "return" });
  });
  return lines;
}

          </button>

      <div className="preview-body">
        {lines.map((l, i) => {
          if (l.k === "blank") return <div key={i} className="line"><span></span></div>;
          if (l.k === "comment") return <div key={i} className="line"><span className="ln-comment">{l.text}</span></div>;
          if (l.k === "hotkey") return (
            <div key={i} className="line">
              <span><span className="ln-hotkey">{l.text}</span>
                {l.comment && <span className="ln-comment">{"  ; " + l.comment}</span>}
              </span>
            </div>
          );
          if (l.k === "return") return <div key={i} className="line"><span className="ln-return">{l.text}</span></div>;
          return <div key={i} className="line"><span className="ln-cmd">{highlightCmd(l.text)}</span></div>;
        })}
      </div>
    </div>
  );
}

function highlightCmd(text) {
  // simple: highlight keyword (Send,/Run,/Winset, etc.) and strings
  const m = text.match(/^(\s*)(\w+)(,?\s*)(.*)$/);
  if (!m) return text;
  return (
    <>
      <span>{m[1]}</span>
      <span className="ln-kw">{m[2]}</span>
      <span>{m[3]}</span>
      <span>{m[4]}</span>
    </>
  );
}

function applyAccent(hex) {
  const p = ACCENT_PRESETS[hex] || ACCENT_PRESETS["#7c5cff"];
  const root = document.documentElement;
  root.style.setProperty("--accent", hex);
  root.style.setProperty("--accent-hi", p.hi);
  root.style.setProperty("--accent-lo", p.lo);
  root.style.setProperty("--accent-ring", p.ring);
  root.style.setProperty("--accent-soft", p.soft);
}

    });
    if (running) {
      toast.push({ kind: "info", title: "Restart needed", desc: "Apply changes to update the running script." });
    }
  };

  const onDeleteHotkey = (hid) => {
    const h = active.hotkeys.find((x) => x.id === hid);
    setConfirm({
      title: "Delete this hotkey?",
      body: <>The binding <Keycap trigger={h.trigger} /> will be removed from <b>{active.name}</b>. This can't be undone.</>,
      confirmLabel: "Delete",
      danger: true,
      onConfirm: () => {
        updateProfile(activeId, (p) => ({ hotkeys: p.hotkeys.filter((h) => h.id !== hid) }));
        setConfirm(null);
        toast.push({ kind: "warn", title: "Hotkey deleted", desc: `${h.trigger} removed from ${active.name}.` });
      },
    });
  };

  const onToggleHotkey = (hid) => {
    updateProfile(activeId, (p) => ({
      hotkeys: p.hotkeys.map((h) => h.id === hid ? { ...h, enabled: !h.enabled } : h),
    }));
  };

  const onDuplicateHotkey = (hid) => {
    updateProfile(activeId, (p) => {
      const h = p.hotkeys.find((x) => x.id === hid);
      const copy = { ...h, id: "h" + Math.random().toString(36).slice(2, 8),
                     description: (h.description || "Hotkey") + " (copy)" };
      const idx = p.hotkeys.findIndex((x) => x.id === hid);
      const next = [...p.hotkeys];
      next.splice(idx + 1, 0, copy);
      return { hotkeys: next };
    });
  };

  const onCreateProfile = () => {
    const id = "profile-" + Math.random().toString(36).slice(2, 6);
    const name = `New Profile ${Object.keys(profiles).length + 1}`;
    setProfiles((p) => ({ ...p, [id]: { id, name, hotkeys: [] } }));
    setActiveId(id);
    toast.push({ kind: "success", title: "Profile created", desc: `Switched to ${name}.` });
  };

  const onDeleteProfile = (id) => {
    const p = profiles[id];
    setConfirm({
      title: `Delete "${p.name}"?`,
      body: <>This will remove <b>{p.hotkeys.length}</b> hotkey{p.hotkeys.length === 1 ? "" : "s"} permanently.</>,
      confirmLabel: "Delete profile",
      danger: true,
      onConfirm: () => {
        setProfiles((cur) => {
          const next = { ...cur };
          delete next[id];
          return next;
        });
        if (activeId === id) {
          const remaining = Object.keys(profiles).filter((k) => k !== id);
          setActiveId(remaining[0] || null);
        }
        if (runningId === id) setRunningId(null);
        setConfirm(null);
        toast.push({ kind: "warn", title: "Profile deleted", desc: `${p.name} was removed.` });
      },
    });
  };

  const onDuplicateProfile = (id) => {
    const p = profiles[id];
    const newId = id + "-copy-" + Math.random().toString(36).slice(2, 4);
    const newP = { ...p, id: newId, name: p.name + " (copy)",
                   hotkeys: p.hotkeys.map((h) => ({ ...h, id: "h" + Math.random().toString(36).slice(2, 8) })) };
    setProfiles((cur) => ({ ...cur, [newId]: newP }));
    setActiveId(newId);
    toast.push({ kind: "info", title: "Profile duplicated", desc: `Created ${newP.name}.` });
  };

  const onRenameProfile = (name) => {
    updateProfile(activeId, () => ({ name }));
  };

  /* ── Apply / Stop ──────────────────────────────────────────── */
  const onApply = (id) => {
    const targetId = id || activeId;
    const target = profiles[targetId];
    if (!target) return;
    setRunningId(targetId);
    setLastApplied(Date.now());
    const n = target.hotkeys.filter((h) => h.enabled).length;
    toast.push({
      kind: "success",
      title: "Script applied",
      desc: <>Running <b>{target.name}</b> with {n} hotkey{n === 1 ? "" : "s"}.</>,
    });
  };
  const onStop = () => {
    setRunningId(null);
    toast.push({ kind: "info", title: "Stopped", desc: `AHK process terminated.` });
  };

  const onExport = () => {
    toast.push({ kind: "success", title: "Exported", desc: `Saved ${active.name.toLowerCase().replace(/\s+/g, "-")}.ahk to Downloads.` });
  };
  const onImport = () => {
    toast.push({ kind: "info", title: "Pick an .ahk file", desc: "Choose a file to parse into a new profile." });
  };

  /* ── Live preview when running profile is edited ───────────── */
  const profileEditedAfterApply = useMemo(() => false, []); // omitted for clarity

  /* ── Time-ago display ──────────────────────────────────────── */
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const i = setInterval(() => setTick((x) => x + 1), 15000);
    return () => clearInterval(i);
  }, []);
  const ago = useMemo(() => {
    const s = Math.floor((Date.now() - lastApplied) / 1000);
    if (s < 60) return s + "s ago";
    const m = Math.floor(s / 60);
    if (m < 60) return m + "m ago";
    return Math.floor(m / 60) + "h ago";
  }, [lastApplied, tick]);

  /* ── Keyboard shortcuts ────────────────────────────────────── */
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "n" && !editingHk) {
        e.preventDefault();
        setEditingHk({});
      }
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault();
        running ? onStop() : onApply();
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  });

  const enabledCount = active ? active.hotkeys.filter((h) => h.enabled).length : 0;

  /* ── Render ────────────────────────────────────────────────── */
  return (
    <div className="app">
      {/* Title bar */}
      <div className="titlebar">
        <div className="titlebar-logo">
          <div className="titlebar-logo-mark">A</div>
          <span>AHK Manager</span>
        </div>
        <span className="titlebar-meta">v0.1.0 · profiles.json</span>
        <div className="titlebar-trail">
          <button className="win-ctrl" title="Settings" onClick={() => setShowSettings(true)}>
            <Icon.Settings />
          </button>
          <span style={{ width: 8 }} />
          <button className="win-ctrl"><Icon.Min /></button>
          <button className="win-ctrl"><Icon.Max /></button>
          <button className="win-ctrl close"><Icon.X /></button>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <Sidebar
          profiles={profiles}
          activeId={activeId}
          runningId={runningId}
          onSelect={setActiveId}
          onCreate={onCreateProfile}
          onDelete={onDeleteProfile}
          onDuplicate={onDuplicateProfile}
          onApply={onApply}
          onStop={onStop}
        />

        {active ? (
          <div className="content">
            <div className="content-head">
              <div>
                <div className="profile-title">
                  <EditableText value={active.name} onChange={onRenameProfile} />
                </div>
                <div className="profile-sub">
                  <span>{active.hotkeys.length} hotkey{active.hotkeys.length === 1 ? "" : "s"}</span>
                  <span className="sep">·</span>
                  <span>{enabledCount} enabled</span>
                  {running && <>
                    <span className="sep">·</span>
                    <span style={{ color: "var(--success)" }}>applied {ago}</span>
                  </>}
                </div>
              </div>
              <div className="flex gap-2">
                <StatusPill running={running} />
                <button
                  className={"btn ghost sm icon-only " + (showPreview ? "" : "")}
                  title={showPreview ? "Hide .ahk preview" : "Show .ahk preview"}
                  onClick={() => setShowPreview((v) => !v)}
                  style={showPreview ? { color: "var(--accent)" } : undefined}
                >
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M5 4l-3 4 3 4M11 4l3 4-3 4"/>
                  </svg>
                </button>
              </div>
            </div>

            <div className={"body " + (showPreview ? "with-preview" : "")}>
              <div className="table-wrap">
                <div className="toolbar">
                  <div className="search" style={{ position: "relative" }}>
                    <span style={{ position: "absolute", left: 10, top: 8, color: "var(--text-3)" }}>
                      <Icon.Search />
                    </span>
                    <input
                      className="input"
                      placeholder="Search triggers, descriptions, actions…"
                      style={{ paddingLeft: 32, height: 30 }}
                      value={query}
                      onChange={(e) => setQuery(e.target.value)}
                    />
                  </div>
                  <span className="spacer" />
                  <Button variant="primary" size="sm" leftIcon={<Icon.Plus />}
                          onClick={() => setEditingHk({})}>Add Hotkey</Button>
                </div>

                <HotkeyTable
                  profile={active}
                  query={query}
                  onEdit={(h) => setEditingHk(h)}
                  onDelete={onDeleteHotkey}
                  onToggle={onToggleHotkey}
                  onDuplicate={onDuplicateHotkey}
                  onAdd={() => setEditingHk({})}
                />
              </div>

              {showPreview && (
                <PreviewPane
                  profile={active}
                  running={running}
                  onCopy={() => toast.push({ kind: "success", title: "Copied", desc: ".ahk source copied to clipboard." })}
                  onClose={() => setShowPreview(false)}
                />
              )}
            </div>
          </div>
        ) : (
          <div className="content">
            <div className="empty" style={{ paddingTop: 120 }}>
              <div className="empty-mark"><Icon.Folder /></div>
              <div className="empty-title">No profile selected</div>
              <div className="empty-desc">Create a profile to start binding hotkeys.</div>
              <Button variant="primary" leftIcon={<Icon.Plus />} onClick={onCreateProfile}>
                Create profile
              </Button>
            </div>
          </div>
        )}
      </div>

      {/* Action bar */}
      <div className="actionbar">
        {running ? (
          <Button variant="" leftIcon={<Icon.Stop />} onClick={onStop}>Stop</Button>
        ) : (
          <Button variant="success" leftIcon={<Icon.Play />} onClick={onApply} disabled={!active || enabledCount === 0}>
            Apply
          </Button>
        )}
        <div className="divider" />
        <Button variant="ghost" size="sm" leftIcon={<Icon.Upload />} onClick={onExport}>Export .ahk</Button>
        <Button variant="ghost" size="sm" leftIcon={<Icon.Download />} onClick={onImport}>Import .ahk</Button>
        <span className="spacer" />
        <span className="stat">
          <span style={{ width: 6, height: 6, borderRadius: 3, background: running ? "var(--success)" : "var(--text-3)" }} />
          {running ? <><b>{enabledCount}</b> hotkeys active</> : "Idle"}
        </span>
        <div className="divider" />
        <span className="stat" title="Keyboard shortcut">
          <span className="kbd mod">⌃</span><span className="kbd">N</span>
          <span style={{ color: "var(--text-3)", marginLeft: 4 }}>new</span>
        </span>
        <span className="stat" style={{ marginLeft: 6 }} title="Apply / Stop">
          <span className="kbd mod">⌃</span><span className="kbd">↵</span>
          <span style={{ color: "var(--text-3)", marginLeft: 4 }}>{running ? "stop" : "apply"}</span>
        </span>
      </div>

      {/* Hotkey modal */}
      {editingHk && (
        <HotkeyModal
          initial={editingHk}
          onSave={onSaveHotkey}
          onClose={() => setEditingHk(null)}
        />
      )}

      {/* Confirm */}
      {confirm && (
        <ConfirmDialog
          title={confirm.title}
          body={confirm.body}
          confirmLabel={confirm.confirmLabel}
          danger={confirm.danger}
          onConfirm={confirm.onConfirm}
          onClose={() => setConfirm(null)}
        />
      )}

      {/* Settings modal */}
      {showSettings && <SettingsModal profiles={profiles} onClose={() => setShowSettings(false)} />}

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakColor
          label="Accent"
          value={t.accent}
          options={["#7c5cff", "#2ee68a", "#ff6b35", "#ededf0"]}
          onChange={(v) => setTweak("accent", v)}
        />
        <TweakRadio
          label="Keycaps"
          value={t.kbdStyle}
          options={[
            { value: "raised", label: "Raised" },
            { value: "chip", label: "Chip" },
            { value: "inline", label: "Inline" },
          ]}
          onChange={(v) => setTweak("kbdStyle", v)}
        />
        <TweakSection label="Layout" />
        <TweakRadio
          label="Density"
          value={t.density}
          options={[
            { value: "tight", label: "Tight" },
            { value: "comfortable", label: "Comfy" },
            { value: "spacious", label: "Spacious" },
          ]}
          onChange={(v) => setTweak("density", v)}
        />
        <TweakToggle
          label="Show .ahk preview"
          value={t.showPreview}
          onChange={(v) => setTweak("showPreview", v)}
        />
      </TweaksPanel>
    </div>
  );
}

/* ── Settings Modal ──────────────────────────────────────────────── */
function SettingsModal({ profiles, onClose }) {
  const [path, setPath] = useState("C:\\Program Files\\AutoHotkey\\AutoHotkey.exe");
  const [launch, setLaunch] = useState("work-macros");
  const [minimized, setMinimized] = useState(false);
  return (
    <Modal onClose={onClose} width={520}>
      <div className="modal-head">
        <div className="modal-title">
          <span className="kicker">Settings</span>
        </div>
        <button className="btn ghost sm icon-only" onClick={onClose}><Icon.Close /></button>
      </div>
      <div className="modal-body">
        <div className="input-group">
          <label>AutoHotkey.exe path</label>
          <div className="flex gap-2">
            <input className="input mono" value={path} onChange={(e) => setPath(e.target.value)} />
            <Button variant="" size="sm">Browse</Button>
          </div>
          <span className="hint" style={{ color: "var(--success)" }}>
            ✓ Detected · v1.1.37.02
          </span>
        </div>
        <div className="input-group">
          <label>Launch profile on app start</label>
          <select className="select" value={launch} onChange={(e) => setLaunch(e.target.value)}>
            <option value="">— None —</option>
            {Object.values(profiles).map((p) => (
              <option key={p.id} value={p.id}>{p.name}</option>
            ))}
          </select>
        </div>
        <div className="flex" style={{ justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 500 }}>Start minimized to tray</div>
            <div style={{ fontSize: 11.5, color: "var(--text-2)", marginTop: 2 }}>
              App opens hidden; right-click tray icon to switch profiles.
            </div>
          </div>
          <Toggle on={minimized} onChange={setMinimized} />
        </div>
        <div style={{ padding: "10px 12px", background: "var(--bg-1)", border: "1px solid var(--border)",
                      borderRadius: 6, fontSize: 11.5, color: "var(--text-2)", fontFamily: "var(--font-mono)" }}>
          <div style={{ color: "var(--text-3)", marginBottom: 4 }}>; Storage</div>
          <div>~\AppData\Local\AHKManager\profiles.json</div>
        </div>
      </div>
      <div className="modal-foot" style={{ justifyContent: "flex-end" }}>
        <Button variant="ghost" onClick={onClose}>Cancel</Button>
        <Button variant="primary" onClick={onClose}>Save settings</Button>
      </div>
    </Modal>
  );
}

function Root() {
  return (
    <ToastProvider>
      <App />
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

  </script>
</body>
</html>
